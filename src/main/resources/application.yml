spring:

  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:/db/migration
    sql-migration-suffixes: sql


  application:
    name: movie15

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    database: mysql
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    generate-ddl: true
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true

jwt:
  #jwt.secret=9c45cb4ce8095b6e3da6cd6925d4f94daefbed2ee70c276335e4c6d9974399a6ae7c47b85a02689c1df3aa2c97cf0bf0a2939d63885b3ddb23bf79f752ad7f3fdaea28ac008ed87d1e88a24ab4d50311ddfaa95ce3158b147d1724764dc0fffaa1af8e2c1c38142ca0d556ccbbe0504dabb25e56ee5023ca9b784b50b845046
  secret: ${JWT_SECRET_KEY}
  expiry-millis: 1800000  # 30분

cloud:
  aws:
    s3:
      bucket: codesix
    credentials:
      access-key: ${ACCESS_KEY}
      secret-key: ${SECRET_KEY}
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false

payment:
  toss:
    secretKey: test_sk_PBal2vxj81jQ4g5GoEPk35RQgOAN
    clientKey: test_ck_ALnQvDd2VJ2l5kawRB4vVMj7X41m
    successUrl: "http://localhost:8080/api/v1/payments/toss/success"
    failUrl: "http://localhost:8080/api/v1/payments/toss/fail"
  # Mail
  mail:
    host: smtp.gmail.com # SMTP 서버 호스트 Gmail 사용
    port: 587 # SMTP 서버 포트
    username: ${MAIL_ACCOUNT}
    password: ${MAIL_PASSWORD}
    protocol: smtp # 메일 전송 프로토콜
    properties:
      mail:
        smtp:
          auth: true # SMTP 서버 인증 활성화
          starttls:
            enable: true # TLS 암호화 활성화
        debug: true # 디버그 모드 활성화 (로그 출력)

  tmdb:
    api-key: ${MDB_API_KEY}
    base-url: "https://api.themoviedb.org/3"

